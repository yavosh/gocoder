model:
  name: unsloth/tinyllama-chat
  max_seq_length: 2048
  load_in_4bit: false

lora:
  r: 16
  alpha: 16
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  dropout: 0.0

training:
  batch_size: 2
  gradient_accumulation_steps: 4
  warmup_steps: 10
  epochs: 1
  learning_rate: 2e-4
  bf16: false
  save_steps: 9999
  logging_steps: 1

dataset:
  train: /home/yavosh/gocoder/data/train.jsonl
  eval: /home/yavosh/gocoder/data/eval.jsonl
  fim_ratio: 0.4
